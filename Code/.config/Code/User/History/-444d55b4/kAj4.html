{% extends 'base.html' %} 
{% block title %}Blogs{% endblock title %}
{% block body %}
{% load static %}
<div class="display-1 text-condensed-rob text-center" id="head-text">Blogs</div>
<div class="container">


    <form action="/blogs/new" method="POST">
        {% csrf_token %}
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Email address</label>
              <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
              <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
            </div>
            <div class="mb-3">
              <label for="exampleInputPassword1" class="form-label">Password</label>
              <input type="password" class="form-control" id="exampleInputPassword1">
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1">
              <label class="form-check-label" for="exampleCheck1">Check me out</label>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
    
        <input type="text" id="id_new_title"placeholder="Enter title here" name="title_text" autofocus>
        <input type="text" id="id_new_body"placeholder="Enter title here" name="body_text">
        <input type="submit" id= "submit_blog"value="Submit">
    
    </form>
</div>

{% endblock body %}
